- name: Add user roboshop
  ansible.builtin.user:
    name: roboshop
    home: /app
    system: true
    shell: /sbin/nologin
    comment: "roboshop system user"
- name: Delete Directory /app
  ansible.builtin.file:
    path: /app
    state: absent
- name: Create directory /app
  ansible.builtin.file:
    path: /app
    state: directory
- name: Delete downloaded {{ component }} zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent
- name: Download package from url
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip
    dest: /tmp/{{ component }}.zip
- name: Unarchive the {{ component }} zip folder
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip
    dest: /app
    remote_src: yes
